<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFP Inspection Management System — Login</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* BFP brand skin */
    :root {
      --navy:       #0D1B2A;
      --navy-mid:   #162234;
      --fire:       #C1272D;
      --fire-light: #E8424A;
      --gold-light: #F0C96A;
      --cream:      #FAF7F2;
      --bs-primary: #C1272D;
      --bs-primary-rgb: 193, 39, 45;
      --bs-body-bg: #FAF7F2;
      --bs-body-font-family: 'DM Sans', system-ui, sans-serif;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); }

    /* Navbar */
    .bfp-navbar { background: var(--navy); }
    .bfp-brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .bfp-brand-sub {
      font-size: 0.68rem;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Login card */
    .login-wrapper {
      min-height: calc(100vh - 60px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      border: 1px solid rgba(212, 168, 67, 0.22);
      border-radius: 14px;
      box-shadow: 0 12px 48px rgba(13,27,42,0.18);
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      color: var(--navy);
    }
    .login-subtitle { font-size: 0.85rem; color: #888; }

    /* Form focus accent */
    .form-control:focus, .form-select:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(13,27,42,0.07);
    }
    .form-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #555;
      font-weight: 600;
    }

    /* Submit button */
    .btn-fire {
      background: linear-gradient(135deg, var(--fire), var(--fire-light));
      border: none;
      color: #fff;
      font-weight: 600;
      box-shadow: 0 6px 18px rgba(193,39,45,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-fire:hover {
      color: #fff;
      transform: translateY(-1px);
      box-shadow: 0 9px 24px rgba(193,39,45,0.38);
      background: linear-gradient(135deg, var(--fire-light), var(--fire));
    }
    .btn-fire:active { transform: translateY(0); }

    /* Admin secret gate */
    #adminSecretGate .form-label { font-weight: 600; font-size: 0.8rem; }
  </style>
</head>
<body>

<!-- Navbar / header -->
<nav class="navbar bfp-navbar py-2 px-3 shadow-sm">
  <div class="container-fluid justify-content-start gap-2">
    <div>
      <div class="bfp-brand-title">Bureau of Fire Protection — Manolo Fortich</div>
      <div class="bfp-brand-sub mt-1">Inspection Management System</div>
    </div>
  </div>
</nav>

<!-- Login -->
<div class="login-wrapper">
  <div class="card login-card">
    <div class="card-body p-4">
      <h2 class="login-title mb-1">Sign in</h2>
      <p class="login-subtitle mb-4">Access the Map, Inspection Logbook, and FSEC Building Plan Logbook.</p>

      <div id="loginError" class="alert alert-danger py-2 px-3 mb-3" role="alert" style="display:none;"></div>

      <form id="loginForm" novalidate autocomplete="off">
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" name="username" type="text" class="form-control"
            autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>

        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control"
            autocomplete="new-password" autocapitalize="off" spellcheck="false">
        </div>

        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Remember this device</label>
        </div>

        <button type="submit" class="btn btn-fire w-100 rounded-pill py-2">Continue</button>
      </form>

      <p class="text-muted mt-3 mb-0" style="font-size:0.8rem;">
        For demo use, accounts come from the database.
      </p>

      <div id="adminSecretGate" class="mt-3" style="display:none;">
        <div class="mb-2">
          <label for="adminSecretInput" class="form-label">Admin secret</label>
          <input id="adminSecretInput" type="password" class="form-control form-control-sm"
            autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <button type="button" id="openAdminBtn" class="btn btn-sm btn-dark">
          Open admin dashboard
        </button>
      </div>
    </div>
  </div>
</div>

<footer class="text-center text-muted py-3 border-top" style="font-size:0.75rem;">
  Bureau of Fire Protection — Inspection Management System &copy; <span id="adminYear" style="cursor:default;">2026</span>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./login.js"></script>
</body>
</html>
