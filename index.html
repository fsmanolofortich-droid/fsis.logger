<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BFP Inspection Management System — Login</title>

  <!-- Bootstrap 5.3 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── BFP brand tokens ──────────────────────────────── */
    :root {
      --navy:        #0D1B2A;
      --navy-mid:    #162234;
      --navy-border: rgba(255,255,255,0.07);
      --fire:        #C1272D;
      --fire-light:  #E8424A;
      --gold:        #D4A843;
      --gold-light:  #F0C96A;
      --cream:       #FAF7F2;
      --bs-primary:  #C1272D;
      --bs-body-bg:  #0D1B2A;
      --bs-body-font-family: 'DM Sans', system-ui, sans-serif;
    }

    /* ── Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      color: #e8e4dd;
      display: flex;
      flex-direction: column;
    }

    /* ── Animated background grid ─────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(193,39,45,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(193,39,45,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Navbar ───────────────────────────────────────── */
    .bfp-navbar {
      background: rgba(13,27,42,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--navy-border);
      z-index: 10;
      position: relative;
    }
    .bfp-brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .bfp-brand-sub {
      font-size: 0.68rem;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .bfp-navbar img { filter: drop-shadow(0 0 6px rgba(193,39,45,0.5)); }

    /* ── Login wrapper ────────────────────────────────── */
    .login-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 16px;
      position: relative;
      z-index: 1;
    }

    /* ── Card ─────────────────────────────────────────── */
    .login-card {
      width: 100%;
      max-width: 420px;
      background: rgba(22, 34, 52, 0.85);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(212,168,67,0.18);
      border-radius: 18px;
      box-shadow:
        0 24px 64px rgba(0,0,0,0.5),
        0 0 0 1px rgba(255,255,255,0.03) inset;
      overflow: hidden;
    }
    .card-top-accent {
      height: 4px;
      background: linear-gradient(90deg, var(--fire), var(--gold), var(--fire-light));
    }
    .card-body-inner { padding: 2rem 2rem 1.75rem; }

    /* ── Title ────────────────────────────────────────── */
    .login-icon {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--fire), var(--fire-light));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: #fff;
      box-shadow: 0 8px 24px rgba(193,39,45,0.4);
      margin-bottom: 1.1rem;
    }
    .login-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.25rem;
    }
    .login-subtitle { font-size: 0.82rem; color: #8fa8c0; }

    /* ── Alert ────────────────────────────────────────── */
    #loginError {
      display: none;
      background: rgba(193,39,45,0.15);
      border: 1px solid rgba(193,39,45,0.4);
      border-radius: 10px;
      color: #ff9aa0;
      font-size: 0.83rem;
      padding: 0.6rem 0.85rem;
      margin-bottom: 1.1rem;
    }

    /* ── Form labels ──────────────────────────────────── */
    .form-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8fa8c0;
      font-weight: 600;
      margin-bottom: 0.4rem;
    }

    /* ── Inputs ───────────────────────────────────────── */
    .form-control {
      background: rgba(13,27,42,0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e8e4dd;
      padding: 0.6rem 0.85rem;
      font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control::placeholder { color: #4a6a85; }
    .form-control:focus {
      background: rgba(13,27,42,0.8);
      border-color: rgba(212,168,67,0.5);
      box-shadow: 0 0 0 3px rgba(212,168,67,0.12);
      color: #fff;
      outline: none;
    }
    .form-control.is-invalid {
      border-color: var(--fire);
      box-shadow: 0 0 0 3px rgba(193,39,45,0.15);
    }
    .form-control.is-valid {
      border-color: #2a9d5c;
      box-shadow: 0 0 0 3px rgba(42,157,92,0.15);
    }

    /* ── Password toggle wrapper ──────────────────────── */
    .input-icon-wrap { position: relative; }
    .input-icon-wrap .form-control { padding-right: 2.5rem; }
    .toggle-pw {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #4a6a85;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      transition: color 0.15s;
    }
    .toggle-pw:hover { color: var(--gold-light); }

    /* ── Remember me ──────────────────────────────────── */
    .form-check-input {
      background-color: rgba(13,27,42,0.6);
      border-color: rgba(255,255,255,0.2);
    }
    .form-check-input:checked {
      background-color: var(--fire);
      border-color: var(--fire);
    }
    .form-check-label { font-size: 0.83rem; color: #8fa8c0; }

    /* ── Submit button ────────────────────────────────── */
    .btn-fire {
      background: linear-gradient(135deg, var(--fire) 0%, var(--fire-light) 100%);
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 50px;
      padding: 0.65rem 1rem;
      font-size: 0.92rem;
      box-shadow: 0 8px 24px rgba(193,39,45,0.35);
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
    }
    .btn-fire:hover:not(:disabled) {
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(193,39,45,0.45);
    }
    .btn-fire:active:not(:disabled) { transform: translateY(0); }
    .btn-fire:disabled { opacity: 0.7; cursor: not-allowed; }

    .btn-spinner {
      display: none;
      width: 1rem; height: 1rem;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
    }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    /* ── Shake animation on error ─────────────────────── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(5px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }
    .shake { animation: shake 0.45s ease; }

    /* ── Admin gate ───────────────────────────────────── */
    #adminSecretGate {
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
    }
    #adminSecretGate .form-label { color: var(--gold-light); }
    #adminSecretGate .form-control { font-size: 0.85rem; }

    /* ── Footer ───────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 0.9rem 1rem;
      font-size: 0.72rem;
      color: #3a5570;
      border-top: 1px solid rgba(255,255,255,0.05);
      position: relative;
      z-index: 1;
    }

    /* ── Toast notification ───────────────────────────── */
    #toastContainer {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      min-width: 280px;
      max-width: 360px;
    }
    .fsis-toast {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      font-size: 0.84rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      border-left: 4px solid transparent;
      animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
      cursor: pointer;
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(40px) scale(0.95); }
      to   { opacity: 1; transform: translateX(0) scale(1); }
    }
    .fsis-toast.hiding {
      animation: toastOut 0.25s ease forwards;
    }
    @keyframes toastOut {
      to { opacity: 0; transform: translateX(40px) scale(0.9); }
    }
    .fsis-toast.toast-error {
      background: rgba(30, 10, 12, 0.92);
      border-left-color: var(--fire);
      color: #ffc8cb;
    }
    .fsis-toast.toast-success {
      background: rgba(10, 30, 18, 0.92);
      border-left-color: #2ecc71;
      color: #a8f5c8;
    }
    .fsis-toast.toast-info {
      background: rgba(10, 20, 36, 0.92);
      border-left-color: #3490dc;
      color: #a8d4f5;
    }
    .fsis-toast .toast-icon { font-size: 1.1rem; line-height: 1; padding-top: 1px; }
    .fsis-toast .toast-msg { flex: 1; line-height: 1.4; }
  </style>
</head>
<body>

<!-- Toast container -->
<div id="toastContainer" role="alert" aria-live="polite"></div>

<!-- Navbar -->
<nav class="navbar bfp-navbar py-2 px-3 shadow-sm">
  <div class="container-fluid justify-content-start gap-2">
    <div>
      <div class="bfp-brand-title">Bureau of Fire Protection — Manolo Fortich</div>
      <div class="bfp-brand-sub mt-1">Inspection Management System</div>
    </div>
  </div>
</nav>

<!-- Login -->
<div class="login-wrapper">
  <div class="login-card" id="loginCard">
    <div class="card-top-accent"></div>
    <div class="card-body-inner">

      <div class="login-icon"><i class="bi bi-shield-lock-fill"></i></div>
      <h2 class="login-title">Sign in</h2>
      <p class="login-subtitle mb-4">Access the FSIS Inspection Management System.</p>

      <!-- Inline error -->
      <div id="loginError" role="alert"></div>

      <form id="loginForm" novalidate autocomplete="off">

        <!-- Username -->
        <div class="mb-3">
          <label class="form-label" for="username">Username</label>
          <input id="username" name="username" type="text" class="form-control"
            placeholder="Enter your username"
            autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label" for="password">Password</label>
          <div class="input-icon-wrap">
            <input id="password" name="password" type="password" class="form-control"
              placeholder="Enter your password"
              autocomplete="new-password" autocapitalize="off" spellcheck="false">
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1"
              aria-label="Show/hide password">
              <i class="bi bi-eye" id="togglePwIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember me -->
        <div class="form-check mb-4">
          <input class="form-check-input" type="checkbox" id="rememberMe">
          <label class="form-check-label" for="rememberMe">Remember this device</label>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-fire w-100" id="loginBtn">
          <span id="loginBtnText">Sign in</span>
          <span class="btn-spinner" id="loginSpinner"></span>
        </button>
      </form>

      <p class="text-muted mt-3 mb-0" style="font-size:0.78rem; color:#3a5570 !important;">
        <i class="bi bi-info-circle me-1"></i>
        Accounts are managed by your system administrator.
      </p>

      <!-- Admin gate (hidden, revealed by 5 clicks on year) -->
      <div id="adminSecretGate" style="display:none;">
        <div class="mb-2">
          <label for="adminSecretInput" class="form-label">
            <i class="bi bi-key-fill me-1"></i>Admin secret
          </label>
          <input id="adminSecretInput" type="password" class="form-control"
            placeholder="Enter admin secret"
            autocomplete="off" autocapitalize="off" spellcheck="false">
        </div>
        <button type="button" id="openAdminBtn" class="btn btn-sm w-100"
          style="background:rgba(212,168,67,0.15);border:1px solid rgba(212,168,67,0.3);color:var(--gold-light);border-radius:8px;">
          <i class="bi bi-speedometer2 me-1"></i> Open Admin Dashboard
        </button>
      </div>

    </div>
  </div>
</div>

<footer>
  Bureau of Fire Protection — Inspection Management System &copy;
  <span id="adminYear" style="cursor:default;">2026</span>
</footer>

<script src="./login.js"></script>
</body>
</html>
